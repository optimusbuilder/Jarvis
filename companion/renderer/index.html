<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AURA Companion</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: rgba(9, 12, 24, 0.84);
        --panel: rgba(14, 20, 43, 0.88);
        --border: rgba(108, 132, 201, 0.35);
        --text: #e9f1ff;
        --muted: #9fb3dd;
        --accent: #78a4ff;
        --good: #2dd4bf;
        --danger: #ef476f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: transparent;
        user-select: none;
      }
      .shell {
        margin: 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 12px;
        backdrop-filter: blur(16px);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .brand {
        font-size: 12px;
        letter-spacing: 0.18em;
        color: #c5d7ff;
        text-transform: uppercase;
      }
      .orb-wrap {
        display: flex;
        justify-content: center;
        margin: 12px 0;
      }
      .orb {
        width: 86px;
        height: 86px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, #93b5ff 0%, #5a81f3 46%, #3452b3 100%);
        position: relative;
        box-shadow: 0 0 38px rgba(92, 138, 255, 0.55), inset 0 0 24px rgba(201, 220, 255, 0.35);
        transition: transform 160ms ease, filter 160ms ease;
      }
      .orb::before,
      .orb::after {
        content: "";
        position: absolute;
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #f4f8ff;
        top: 32px;
      }
      .orb::before { left: 26px; }
      .orb::after { right: 26px; }
      .orb-mouth {
        position: absolute;
        left: 50%;
        bottom: 24px;
        width: 24px;
        height: 6px;
        margin-left: -12px;
        border-radius: 999px;
        background: #eef5ff;
      }
      .orb.idle {
        animation: drift 3.2s ease-in-out infinite;
      }
      .orb.listening {
        animation: pulse 1.1s ease-in-out infinite;
        filter: saturate(1.2);
      }
      .orb.thinking {
        animation: spin 1.3s linear infinite;
      }
      .orb.error {
        background: radial-gradient(circle at 30% 30%, #ffa0b5 0%, #ea4b70 46%, #8c1d39 100%);
      }
      @keyframes drift {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
      @keyframes spin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.05); }
        100% { transform: rotate(360deg) scale(1); }
      }
      .status {
        text-align: center;
        font-size: 13px;
        color: var(--muted);
        min-height: 18px;
      }
      .pill-row {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin: 8px 0 10px;
        flex-wrap: wrap;
      }
      .pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        color: var(--muted);
      }
      .pill.on {
        color: #b2ffef;
        border-color: rgba(45, 212, 191, 0.5);
      }
      .pill.danger {
        color: #ffd4df;
        border-color: rgba(239, 71, 111, 0.5);
      }
      textarea {
        width: 100%;
        min-height: 62px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        color: var(--text);
        padding: 10px;
        resize: vertical;
        font: inherit;
      }
      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      }
      .buttons.three {
        grid-template-columns: 1fr 1fr 1fr;
      }
      button {
        border: 1px solid var(--border);
        background: rgba(25, 34, 68, 0.88);
        color: var(--text);
        padding: 9px 10px;
        border-radius: 10px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      button:hover {
        border-color: var(--accent);
      }
      .single {
        margin-top: 8px;
        width: 100%;
      }
      .section-title {
        margin-top: 8px;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .log {
        margin-top: 8px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(8, 12, 28, 0.85);
        padding: 8px;
        font-size: 11px;
        min-height: 58px;
        color: #d4e3ff;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .error {
        color: #ffb8c7;
      }
      .footer {
        margin-top: 8px;
        text-align: center;
        font-size: 10px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="top">
        <div class="brand">AURA</div>
        <button id="refreshBtn" title="Refresh">↻</button>
      </div>

      <div class="orb-wrap">
        <div id="orb" class="orb idle"><div class="orb-mouth"></div></div>
      </div>

      <div id="statusText" class="status">Ready</div>
      <div class="pill-row">
        <span id="modePill" class="pill">Mode: live</span>
        <span id="wakePill" class="pill">Wake: off</span>
        <span id="killPill" class="pill">Kill: off</span>
        <span id="stackPill" class="pill">Stack: stopped</span>
      </div>

      <textarea id="instructionInput" placeholder="Tell Aura what to do…"></textarea>

      <div class="buttons">
        <button id="runBtn">Run</button>
        <button id="listenBtn">Start Listen</button>
        <button id="stopBtn">Stop + Run</button>
        <button id="wakeBtn">Toggle Wake</button>
        <button id="modeBtn">Toggle Mode</button>
        <button id="killBtn">Toggle Kill</button>
      </div>

      <div class="section-title">Accessibility & Reliability</div>
      <div class="buttons three">
        <button id="loginBtn">Open At Login</button>
        <button id="soundBtn">Sound Cues</button>
        <button id="restartBtn">Auto Restart</button>
      </div>
      <div class="buttons">
        <button id="startStackBtn">Start Stack</button>
        <button id="stopStackBtn">Stop Stack</button>
      </div>

      <button id="openCenterBtn" class="single">Open Full Control Center</button>
      <div id="log" class="log">Waiting for agent status…</div>
      <div class="footer">Hotkeys: ⌘/Ctrl+Shift+Space, ⌘/Ctrl+Shift+A, ⌘/Ctrl+Shift+K</div>
    </div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
