<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AURA Phase 3 Fixture</title>
    <style>
      body {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 24px;
        line-height: 1.45;
      }
      form {
        max-width: 560px;
        display: grid;
        gap: 12px;
      }
      label {
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Application Form Fixture</h1>
    <p>This fixture validates extension redaction and snapshot transport.</p>
    <p>SSN example: 123-45-6789 (must be filtered from snapshots).</p>

    <form>
      <label for="fullName">Full Name</label>
      <input id="fullName" name="fullName" type="text" />

      <label for="coverLetter">Cover Letter</label>
      <textarea id="coverLetter" name="coverLetter" rows="5"></textarea>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" value="secret-password" />

      <label for="cardNumber">Credit Card Number</label>
      <input id="cardNumber" name="cardNumber" type="text" value="4111 1111 1111 1111" />

      <input type="hidden" id="internal-id" name="internal-id" value="do-not-send" />
    </form>
  </body>
</html>
